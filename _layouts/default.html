<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      html { scroll-behavior: smooth; }
      :root {
        --pcb-green: #061a18;
        --soldermask: #0a2e2a;
        --copper: #d4af37;
        --silkscreen: #ffffff;
        --trace-lowkey: rgba(212, 175, 55, 0.05);
      }
      body { 
        background-color: var(--pcb-green); 
        color: #cfd8dc; 
        margin: 0; 
        font-family: 'Inter', sans-serif; /* Clean readable font */
        background-image: radial-gradient(var(--trace-lowkey) 1px, transparent 0);
        background-size: 40px 40px;
        line-height: 1.6;
      }
      .nav-menu { 
        position: fixed; top: 0; width: 100%; background: rgba(10, 46, 42, 0.98); 
        z-index: 9999; text-align: center; padding: 18px 0; border-bottom: 1px solid var(--copper); 
      }
      .nav-menu a { 
        color: var(--copper); text-decoration: none; margin: 0 15px; 
        font-weight: 600; font-size: 0.75rem; letter-spacing: 1.5px; 
        font-family: 'JetBrains Mono', monospace;
      }
      .nav-menu a:hover { color: var(--silkscreen); }

      .page-header { 
        padding: 9rem 1rem 5rem 1rem; 
        background: linear-gradient(135deg, var(--soldermask) 0%, var(--pcb-green) 100%); 
        color: var(--silkscreen); text-align: center; border-bottom: 3px solid var(--copper); 
      }
      .project-name { 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 3rem; font-weight: 700; color: var(--copper); margin: 0; 
      }
      .project-tagline { 
        font-weight: 300; font-size: 1.1rem; opacity: 0.9; letter-spacing: 0.5px; 
      }

      .main-content { max-width: 850px; padding: 2rem; margin: 0 auto; }
      
      .main-content h1 { 
        font-family: 'JetBrains Mono', monospace;
        color: var(--silkscreen); border-left: 4px solid var(--copper); 
        padding-left: 15px; margin-top: 4rem; display: flex; align-items: center; gap: 12px;
        font-size: 1.6rem; text-transform: uppercase;
      }
      
      /* Card Styling */
      .project-card {
        background: rgba(10, 46, 42, 0.4); border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 12px; padding: 1.8rem; margin-bottom: 2.5rem;
        transition: transform 0.2s ease, border 0.2s ease;
      }
      .project-card:hover { transform: translateY(-3px); border-color: var(--copper); }
      
      .card-category { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #00ffcc; letter-spacing: 2px; }
      .card-stats { display: flex; gap: 25px; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 6px; margin: 1.2rem 0; border: 1px solid rgba(212, 175, 55, 0.1); }
      .stat-value { font-family: 'JetBrains Mono', monospace; color: #00ffcc; font-size: 1.1rem; }
      .stat-label { font-size: 0.6rem; font-family: 'Inter', sans-serif; font-weight: 600; color: var(--copper); text-transform: uppercase; }
      
      .tag { 
        background: rgba(212, 175, 55, 0.08); border: 1px solid rgba(212, 175, 55, 0.4); 
        color: var(--copper); padding: 3px 10px; font-size: 0.7rem; border-radius: 4px; 
        font-family: 'JetBrains Mono', monospace; font-weight: 500;
      }
      
      section { padding-top: 100px; }
      hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--copper), transparent); opacity: 0.4; margin: 4rem 0; }
    </style>
  </head>
  <body>
    <nav class="nav-menu">
      <a href="#about">ABOUT</a>
      <a href="#experience">EXPERIENCE</a>
      <a href="#projects">PROJECTS</a>
      <a href="#timeline">TIMELINE</a>
      <a href="./Resume.pdf" target="_blank">RESUME</a>
      <a href="#contact">CONTACT</a>
    </nav>
    <header class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
    </header>
    <main class="main-content">
      {{ content }}
      <footer style="text-align: center; padding: 5rem 0; color: #455a64; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace;">
        &copy; 2026 ADITYA MANIVEL // STATUS: ACTIVE
      </footer>
    </main>
  </body>
</html>
