<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      html { scroll-behavior: smooth; }
      :root {
        --pcb-green: #061a18;
        --soldermask: #0a2e2a;
        --copper: #d4af37;
        --silkscreen: #ffffff;
        --trace-lowkey: rgba(212, 175, 55, 0.05);
      }
      body { 
        background-color: var(--pcb-green); color: #cfd8dc; margin: 0; 
        font-family: 'Segoe UI', Arial, sans-serif;
        background-image: radial-gradient(var(--trace-lowkey) 1px, transparent 0);
        background-size: 40px 40px;
      }
      .nav-menu { 
        position: fixed; top: 0; width: 100%; background: rgba(10, 46, 42, 0.98); 
        z-index: 9999; text-align: center; padding: 18px 0; border-bottom: 1px solid var(--copper); 
      }
      .nav-menu a { color: var(--copper); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; }
      .nav-menu a:hover { color: var(--silkscreen); }
      .page-header { padding: 8rem 1rem 4rem 1rem; background: linear-gradient(135deg, var(--soldermask) 0%, var(--pcb-green) 100%); color: var(--silkscreen); text-align: center; border-bottom: 3px solid var(--copper); }
      .project-name { font-size: 2.8rem; color: var(--copper); margin: 0; }
      .main-content { max-width: 900px; padding: 2rem; margin: 0 auto; }
      
      /* Titles & Icons */
      .main-content h1 { 
        color: var(--silkscreen); border-left: 4px solid var(--copper); 
        padding-left: 15px; margin-top: 3.5rem; display: flex; align-items: center; gap: 12px;
        font-size: 1.8rem;
      }
      .main-content h1 i { color: var(--copper); font-size: 1.4rem; }
      
      /* Technical Data Cards */
      .project-card {
        background: rgba(10, 46, 42, 0.5); border: 1px solid var(--copper);
        border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem;
      }
      .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
      .card-category { font-family: monospace; font-size: 0.7rem; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
      .card-stats { display: flex; gap: 20px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; margin: 1rem 0; }
      .stat-item { text-align: center; }
      .stat-value { color: #00ffcc; font-weight: bold; font-family: monospace; display: block; }
      .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--copper); }
      .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
      .tag { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--copper); color: var(--copper); padding: 2px 8px; font-size: 0.7rem; border-radius: 3px; font-family: monospace; }
      
      section { padding-top: 110px; margin-top: -60px; }
      hr { border: 0; height: 1px; background: var(--copper); opacity: 0.3; margin: 3rem 0; }
    </style>
  </head>
  <body>
    <nav class="nav-menu">
      <a href="#about">ABOUT</a>
      <a href="#experience">EXPERIENCE</a>
      <a href="#projects">PROJECTS</a>
      <a href="#timeline">TIMELINE</a>
      <a href="./Resume.pdf" target="_blank">RESUME</a>
      <a href="#contact">CONTACT</a>
    </nav>
    <header class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
    </header>
    <main class="main-content">
      {{ content }}
      <footer style="text-align: center; padding: 4rem; color: #455a64; font-size: 0.8rem;">
        &copy; 2026 Aditya Manivel | Electrical & Computer Engineering
      </footer>
    </main>
  </body>
</html>
