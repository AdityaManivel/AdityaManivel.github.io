<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      html { scroll-behavior: smooth; }
      
      /* PCB Color Palette */
      /* Dark Soldermask: #0a2e2a | Copper/Gold: #d4af37 | Silk Screen: #ffffff */
      
      body { background-color: #061a18; color: #cfd8dc; margin: 0; font-family: 'Courier New', monospace; }
      
      /* The Header - Deep PCB Green Gradient */
      .page-header { 
        padding: 8rem 1rem 4rem 1rem; 
        background: linear-gradient(135deg, #0a2e2a 0%, #061a18 100%); 
        color: #ffffff; 
        text-align: center; 
        border-bottom: 3px solid #d4af37; /* Copper Trace Line */
      }

      /* Sticky Nav - The "Bus Route" */
      .nav-menu { 
        position: fixed; top: 0; width: 100%; 
        background: rgba(10, 46, 42, 0.95); 
        z-index: 9999; text-align: center; padding: 18px 0; 
        border-bottom: 1px solid #d4af37; 
      }
      .nav-menu a { 
        color: #d4af37; /* Copper Gold */
        text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.85rem; 
        letter-spacing: 2px; transition: 0.3s; 
      }
      .nav-menu a:hover { color: #ffffff; text-shadow: 0 0 8px #d4af37; }

      .project-name { font-size: 2.8rem; color: #d4af37; text-transform: uppercase; }
      
      .main-content { max-width: 900px; padding: 2rem; margin: 0 auto; }
      
      /* Headings look like Silk Screen Printing */
      .main-content h1, .main-content h2 { 
        color: #ffffff; 
        border-left: 5px solid #d4af37; 
        padding-left: 15px; 
        margin-top: 3rem; 
        text-transform: uppercase;
      }

      /* Links look like highlighted traces */
      .main-content a { color: #00ffcc; text-decoration: none; border-bottom: 1px solid #00ffcc; }
      
      section { padding-top: 110px; }
      footer { text-align: center; padding: 3rem; color: #455a64; font-size: 0.7rem; }
    </style>
  </head>
  <body>
    <nav class="nav-menu">
      <a href="#about">ABOUT</a>
      <a href="#experience">EXPERIENCE</a>
      <a href="#projects">PROJECTS</a>
      <a href="#timeline">TIMELINE</a>
      <a href="./Resume.pdf" target="_blank">RESUME</a>
      <a href="#contact">CONTACT</a>
    </nav>
    <header class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">SYSTEMS_ENGINEER // {{ site.description }}</h2>
    </header>
    <main class="main-content">
      {{ content }}
      <footer>&copy; 2026 ADITYA_MANIVEL | HARDWARE_REVISION_1.0</footer>
    </main>
  </body>
</html>
