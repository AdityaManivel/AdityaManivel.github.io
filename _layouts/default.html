<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      html { scroll-behavior: smooth; }
      :root {
        --pcb-green: #061a18;
        --soldermask: #0a2e2a;
        --copper: #d4af37;
        --silkscreen: #ffffff;
        --neon-cyan: #00ffcc;
      }
      
      body { 
        background-color: var(--pcb-green); 
        color: #cfd8dc; margin: 0; font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden;
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4af37' stroke-width='0.5' stroke-opacity='0.05'%3E%3Cpath d='M10 10h30v10h10v30h20v10h30'/%3E%3Ccircle cx='10' cy='10' r='1.5'/%3E%3Cpath d='M0 80h20v-20h10V20H0'/%3E%3Ccircle cx='30' cy='20' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
      }

      .nav-menu { 
        position: fixed; top: 0; width: 100%; background: rgba(10, 46, 42, 0.95); 
        backdrop-filter: blur(8px); z-index: 9999; text-align: center; padding: 18px 0; border-bottom: 1px solid var(--copper); 
      }
      .nav-menu a { color: var(--copper); text-decoration: none; margin: 0 15px; font-weight: 600; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }

      .page-header { padding: 10rem 1rem 6rem 1rem; background: linear-gradient(135deg, var(--soldermask) 0%, var(--pcb-green) 100%); text-align: center; border-bottom: 3px solid var(--copper); }
      .project-name { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; color: var(--copper); margin: 0; }

      .main-content { max-width: 900px; padding: 2rem; margin: 0 auto; }
      .main-content h1 { font-family: 'JetBrains Mono', monospace; color: var(--silkscreen); border-left: 4px solid var(--copper); padding-left: 15px; margin-top: 4rem; text-transform: uppercase; }

      footer { text-align: center; padding: 6rem 0; color: #455a64; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
      hr { border: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--copper), transparent); opacity: 0.3; margin: 4rem 0; }
    </style>
  </head>
  <body>
    <nav class="nav-menu">
      <a href="#about">ABOUT</a>
      <a href="#skills">SKILLS</a>
      <a href="#experience">EXPERIENCE</a>
      <a href="#projects">PROJECTS</a>
      <a href="./Resume.pdf" target="_blank">RESUME</a>
      <a href="#contact">CONTACT</a>
    </nav>

    <header class="page-header">
      <h1 class="project-name">{{ site.title | default: "Aditya Manivel" }}</h1>
      <h2 style="color:white; opacity:0.8; font-weight: 300;">{{ site.description }}</h2>
    </header>

    <main class="main-content">
      {{ content }}
      
      <footer>
        &copy; 2026 ADITYA MANIVEL // STATUS: ACTIVE
      </footer>
    </main>
  </body>
</html>
