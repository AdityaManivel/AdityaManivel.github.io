<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      html { scroll-behavior: smooth; }
      
      :root {
        --pcb-green: #061a18;
        --soldermask: #0a2e2a;
        --copper: #d4af37;
        --silkscreen: #ffffff;
        --trace-lowkey: rgba(212, 175, 55, 0.05);
      }

      body { 
        background-color: var(--pcb-green); 
        color: #cfd8dc; 
        margin: 0; 
        font-family: 'Segoe UI', Arial, sans-serif;
        /* Subtle Grid Pattern */
        background-image: 
          radial-gradient(var(--trace-lowkey) 1px, transparent 0),
          linear-gradient(to right, var(--trace-lowkey) 1px, transparent 1px),
          linear-gradient(to bottom, var(--trace-lowkey) 1px, transparent 1px);
        background-size: 40px 40px, 80px 80px, 80px 80px;
      }
      
      .nav-menu { 
        position: fixed; top: 0; width: 100%; 
        background: rgba(10, 46, 42, 0.98); 
        z-index: 9999; text-align: center; padding: 18px 0; 
        border-bottom: 1px solid var(--copper); 
      }
      .nav-menu a { 
        color: var(--copper); 
        text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.8rem; 
        letter-spacing: 1px; transition: 0.3s; 
      }
      .nav-menu a:hover { color: var(--silkscreen); }

      .page-header { 
        padding: 8rem 1rem 4rem 1rem; 
        background: linear-gradient(135deg, var(--soldermask) 0%, var(--pcb-green) 100%); 
        color: var(--silkscreen); 
        text-align: center; 
        border-bottom: 3px solid var(--copper); 
      }

      .project-name { font-size: 2.8rem; color: var(--copper); }
      
      .main-content { max-width: 900px; padding: 2rem; margin: 0 auto; }
      
      .main-content h1, .main-content h2 { 
        color: var(--silkscreen); 
        border-left: 4px solid var(--copper); 
        padding-left: 15px; 
        margin-top: 3.5rem; 
      }

      .main-content a { color: #00ffcc; text-decoration: none; border-bottom: 1px solid rgba(0, 255, 204, 0.2); }
      
      section { padding-top: 110px; margin-top: -60px; }
      footer { text-align: center; padding: 4rem; color: #455a64; font-size: 0.8rem; }
      hr { border: 0; height: 1px; background: var(--copper); opacity: 0.3; margin: 3rem 0; }
    </style>
  </head>
  <body>
    <nav class="nav-menu">
      <a href="#about">ABOUT</a>
      <a href="#experience">EXPERIENCE</a>
      <a href="#projects">PROJECTS</a>
      <a href="#timeline">TIMELINE</a>
      <a href="./Resume.pdf" target="_blank">RESUME</a>
      <a href="#contact">CONTACT</a>
    </nav>
    <header class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
    </header>
    <main class="main-content">
      {{ content }}
      <footer>&copy; 2026 Aditya Manivel | Electrical & Computer Engineering</footer>
    </main>
  </body>
</html>
